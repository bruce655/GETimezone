<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time Sync Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/luxon/3.4.4/luxon.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b;
            --accent: #0071e3; --accent-hover: #0077ed; 
            --dst-active: #e8f5e9; --dst-text: #2e7d32;
            --upcoming-color: #d97706; 
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            padding: 20px 30px; max-width: 1400px; margin: 0 auto; overflow-x: hidden; 
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 0; font-weight: 700; }
        .header-controls { display: flex; gap: 12px; align-items: center; }
        .lang-selector {
            padding: 8px 12px; border-radius: 20px; border: 1px solid #d2d2d7;
            background-color: white; font-size: 13px; font-weight: 600; color: var(--text-main);
            cursor: pointer; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        button {
            background-color: var(--accent); color: white; border: none;
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            font-size: 13px; font-weight: 600; box-shadow: 0 2px 8px rgba(0, 113, 227, 0.3);
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        
        #app-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; align-items: start; margin-bottom: 30px; }
        .region-group { display: flex; flex-direction: column; gap: 12px; }
        .region-title { font-size: 15px; font-weight: 700; color: var(--text-muted); padding-bottom: 6px; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; }
        
        .tz-card {
            background-color: var(--card-bg); border-radius: 10px; padding: 14px 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04); border-left: 4px solid transparent;
            display: flex; flex-direction: column; gap: 12px; transition: background-color 0.3s, border-color 0.3s;
        }
        .tz-top-section { display: flex; justify-content: space-between; align-items: flex-start; }
        .tz-info { display: flex; flex-direction: column; gap: 6px; padding-right: 10px; }
        .tz-name { font-weight: 700; font-size: 14px; line-height: 1.4; display: flex; align-items: center; gap: 6px; }
        .tz-meta { display: flex; flex-wrap: wrap; gap: 4px; }
        .badge { padding: 2px 6px; border-radius: 4px; background-color: #e2e8f0; font-weight: 600; font-size: 10px; color: var(--text-muted); }
        .badge.dst-active { background-color: var(--dst-active); color: var(--dst-text); }
        
        .tz-dst-upcoming { font-size: 11px; color: var(--upcoming-color); font-weight: 600; }
        .tz-holiday {
            font-size: 11px; color: #b91c1c; font-weight: 600;
            background-color: #fef2f2; border: 1px solid #fca5a5;
            padding: 4px 8px; border-radius: 6px; margin-top: 4px; display: none; 
        }

        .tz-time-block { text-align: right; flex-shrink: 0; }
        .tz-time { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .tz-date { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .slider-container { width: 100%; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); margin: 0; }
        
        /* 三時段變色樣式 */
        .is-morning { border-left-color: #10b981; background-color: #e6f4ea; } 
        .is-work { border-left-color: #f59e0b; background-color: #fef7e0; }    
        .is-rest { border-left-color: #6b7280; background-color: #f1f3f4; }    
        
        .map-section { background-color: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 40px; }
        .map-header { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: var(--text-main); }
        #map { height: 450px; width: 100%; border-radius: 8px; background-color: #e5e7eb; z-index: 1; }
        .glowing-dot { width: 10px; height: 10px; background-color: var(--accent); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px 3px rgba(0, 113, 227, 0.6); animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { 0% { box-shadow: 0 0 4px 2px rgba(0, 113, 227, 0.4); transform: scale(0.95); } 100% { box-shadow: 0 0 12px 5px rgba(0, 113, 227, 0.8); transform: scale(1.1); } }
        .custom-glow-icon { display: flex; justify-content: center; align-items: center; }
        
        /* 地圖 Tooltip 客製化樣式 */
        .leaflet-tooltip.map-tooltip { 
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #d2d2d7;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 6px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            padding: 8px 12px;
        }
        .map-tooltip-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
        .map-tooltip-tz { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="mainTitle">全球時區同步儀表板</h1>
        <div class="header-controls">
            <select class="lang-selector" id="langSelect" onchange="changeLang(this.value)">
                <option value="zh" selected>繁體中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
            </select>
            <button id="resetBtn" onclick="resetToNow()">回到現在時間</button>
        </div>
    </div>

    <div id="app-container"></div>

    <div class="map-section">
        <div class="map-header" id="mapTitle">📍 全球協作據點分佈</div>
        <div id="map"></div>
    </div>

    <script>
        // === 1. 多國語言字典 (i18n) ===
        const i18n = {
            zh: {
                title: "全球時區同步儀表板", reset: "回到現在時間", map: "📍 全球協作據點分佈",
                std: "標準時間", dst: "☀️ 日光節約", dstOn: "預計下一次日光節約時間的轉換時間", weekendOff: "週末假日",
                regions: ["亞太地區 (APAC)", "歐洲與中東 (EMEA)", "北美與中美 (NORTH AMERICA)"],
                zones: [
                    "台灣 / 中國 / 新加坡 / 馬來西亞", "印度 (新德里/班加羅爾/海得拉巴)", "日本 / 韓國", "澳洲 (雪梨/墨爾本)", "紐西蘭", "泰國 / 越南",
                    "約旦 / 沙烏地阿拉伯 / 土耳其", "羅馬尼亞", "德國 / 西班牙", "英國 / 葡萄牙",
                    "美東 EST (紐約/夏洛特)", "美中 CST (芝加哥/Las Colinas)", "美西 PST (西雅圖/洛杉磯)", "哥斯大黎加", "鳳凰城 (Phoenix, AZ)"
                ],
                countries: { TW: "台灣", CN: "中國", SG: "新加坡", MY: "馬來西亞", IN: "印度", JP: "日本", KR: "韓國", AU: "澳洲", NZ: "紐西蘭", TH: "泰國", VN: "越南", JO: "約旦", TR: "土耳其", RO: "羅馬尼亞", DE: "德國", ES: "西班牙", GB: "英國", PT: "葡萄牙", US: "美國", CR: "哥斯大黎加" }
            },
            en: {
                title: "Global Time Sync Dashboard", reset: "Reset to Now", map: "📍 Global Hubs",
                std: "Standard Time", dst: "☀️ DST Active", dstOn: "Next DST transition on", weekendOff: "Weekend Off",
                regions: ["APAC", "EMEA", "NORTH AMERICA"],
                zones: [
                    "Taiwan / China / SG / MY", "India (Delhi / BLR / HYD)", "Japan / Korea", "Australia (SYD/MEL)", "New Zealand", "Thailand / Vietnam",
                    "Jordan / Saudi / Turkey", "Romania", "Germany / Spain", "UK / Portugal",
                    "EST (New York / Charlotte)", "CST (Chicago / Las Colinas)", "PST (Seattle / LA)", "Costa Rica", "Phoenix (AZ)"
                ],
                countries: { TW: "Taiwan", CN: "China", SG: "SG", MY: "MY", IN: "India", JP: "Japan", KR: "Korea", AU: "Australia", NZ: "New Zealand", TH: "Thailand", VN: "Vietnam", JO: "Jordan", TR: "Turkey", RO: "Romania", DE: "Germany", ES: "Spain", GB: "UK", PT: "Portugal", US: "US", CR: "Costa Rica" }
            },
            ja: {
                title: "グローバルタイム同期ダッシュボード", reset: "現在時刻にリセット", map: "📍 グローバル拠点マップ",
                std: "標準時", dst: "☀️ 夏時間", dstOn: "次回の夏時間切替", weekendOff: "週末休み",
                regions: ["アジア太平洋 (APAC)", "欧州・中東 (EMEA)", "北米・中米 (NORTH AMERICA)"],
                zones: [
                    "台湾 / 中国 / シンガポール / マレーシア", "インド (デリー/BLR/HYD)", "日本 / 韓国", "オーストラリア (シドニー/メルボルン)", "ニュージーランド", "タイ / ベトナム",
                    "ヨルダン / サウジ / トルコ", "ルーマニア", "ドイツ / スペイン", "イギリス / ポルトガル",
                    "EST (ニューヨーク/シャーロット)", "CST (シカゴ/Las Colinas)", "PST (シアトル/ロサンゼルス)", "コスタリカ", "フェニックス (Phoenix, AZ)"
                ],
                countries: { TW: "台湾", CN: "中国", SG: "シンガポール", MY: "マレーシア", IN: "インド", JP: "日本", KR: "韓国", AU: "オーストラリア", NZ: "ニュージーランド", TH: "タイ", VN: "ベトナム", JO: "ヨルダン", TR: "トルコ", RO: "ルーマニア", DE: "ドイツ", ES: "スペイン", GB: "イギリス", PT: "ポルトガル", US: "米国", CR: "コスタリカ" }
            },
            ko: {
                title: "글로벌 시간 동기화 대시보드", reset: "현재 시간으로 재설정", map: "📍 글로벌 허브",
                std: "표준시", dst: "☀️ 일광 절약", dstOn: "다음 일광 절약 전환", weekendOff: "주말 휴무",
                regions: ["아시아 태평양 (APAC)", "유럽 및 중동 (EMEA)", "북미 (NORTH AMERICA)"],
                zones: [
                    "대만 / 중국 / 싱가포르 / 말레이시아", "인도 (델리/BLR/HYD)", "일본 / 한국", "호주 (시드니/멜버른)", "뉴질랜드", "태국 / 베트남",
                    "요르단 / 사우디아라비아 / 튀르키예", "루마니아", "독일 / 스페인", "영국 / 포르투갈",
                    "EST (뉴욕/샬럿)", "CST (시카고/Las Colinas)", "PST (시애틀/LA)", "코스타리카", "피닉스 (Phoenix, AZ)"
                ],
                countries: { TW: "대만", CN: "중국", SG: "싱가포르", MY: "말레이시아", IN: "인도", JP: "일본", KR: "한국", AU: "호주", NZ: "뉴질랜드", TH: "태국", VN: "베트남", JO: "요르단", TR: "튀르키예", RO: "루마니아", DE: "독일", ES: "스페인", GB: "영국", PT: "포르투갈", US: "미국", CR: "코스타리카" }
            }
        };

        const customHolidays = {
            'TW': [
                { date: '2026-02-27', name: { zh: '和平紀念日 (補假)', en: 'Peace Memorial Day (Obs.)', ja: '平和記念日 (振替)', ko: '평화기념일 (대체휴일)' } },
                { date: '2026-02-28', name: { zh: '和平紀念日', en: 'Peace Memorial Day', ja: '平和記念日', ko: '평화기념일' } }
            ]
        };

        let currentLang = 'zh';
        const DateTime = luxon.DateTime;
        let globalUnixTime = DateTime.now().toMillis();
        let allZones = [];

        window.changeLang = function(lang) {
            currentLang = lang;
            document.getElementById('mainTitle').innerText = i18n[lang].title;
            document.getElementById('resetBtn').innerText = i18n[lang].reset;
            document.getElementById('mapTitle').innerText = i18n[lang].map;
            
            initTimeSync(); 
        };

        function getRegionData() {
            const t = i18n[currentLang];
            return [
                {
                    region: t.regions[0],
                    zones: [
                        { id: 'tw-cn-sg-my', name: t.zones[0], tz: 'Asia/Taipei', countries: ['TW', 'CN', 'SG', 'MY'] },
                        { id: 'in', name: t.zones[1], tz: 'Asia/Kolkata', countries: ['IN'] },
                        { id: 'jp-kr', name: t.zones[2], tz: 'Asia/Tokyo', countries: ['JP', 'KR'] },
                        { id: 'au', name: t.zones[3], tz: 'Australia/Sydney', countries: ['AU'] },
                        { id: 'nz', name: t.zones[4], tz: 'Pacific/Auckland', countries: ['NZ'] },
                        { id: 'th-vn', name: t.zones[5], tz: 'Asia/Bangkok', countries: ['TH', 'VN'] }
                    ]
                },
                {
                    region: t.regions[1],
                    zones: [
                        { id: 'jo-sa-tr', name: t.zones[6], tz: 'Asia/Riyadh', countries: ['JO', 'TR'] }, 
                        { id: 'ro', name: t.zones[7], tz: 'Europe/Bucharest', countries: ['RO'] },
                        { id: 'de-es', name: t.zones[8], tz: 'Europe/Berlin', countries: ['DE', 'ES'] },
                        { id: 'uk-pt', name: t.zones[9], tz: 'Europe/London', countries: ['GB', 'PT'] }
                    ]
                },
                {
                    region: t.regions[2],
                    zones: [
                        { id: 'est', name: t.zones[10], tz: 'America/New_York', countries: ['US'] },
                        { id: 'cst', name: t.zones[11], tz: 'America/Chicago', countries: ['US'] },
                        { id: 'pst', name: t.zones[12], tz: 'America/Los_Angeles', countries: ['US'] },
                        { id: 'cr', name: t.zones[13], tz: 'America/Costa_Rica', countries: ['CR'] },
                        { id: 'phx', name: t.zones[14], tz: 'America/Phoenix', countries: ['US'] }
                    ]
                }
            ];
        }

        const container = document.getElementById('app-container');

        function initTimeSync() {
            container.innerHTML = '';
            allZones = []; 
            let globalIndex = 0;
            const currentNow = DateTime.now();
            const data = getRegionData();
            const t = i18n[currentLang];

            data.forEach(group => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'region-group';
                groupDiv.innerHTML = `<div class="region-title">${group.region}</div>`;

                group.zones.forEach(zone => {
                    let currentDt = currentNow.setZone(zone.tz);
                    let currentOffset = currentDt.offset;
                    let nextTransitionText = '';
                    
                    for (let i = 1; i <= 365; i++) {
                        let nextDt = currentNow.plus({ days: i }).setZone(zone.tz);
                        if (nextDt.offset !== currentOffset) {
                            const offsetHours = nextDt.offset / 60;
                            const offsetStr = `UTC${offsetHours >= 0 ? '+' : ''}${offsetHours}`;
                            nextTransitionText = `${t.dstOn} ${nextDt.toFormat('yyyy/MM/dd')} (${offsetStr})`;
                            break; 
                        }
                    }
                    zone.nextTransitionText = nextTransitionText;
                    zone.fetchedHolidayText = ''; 

                    allZones.push(zone);
                    const currentIndex = globalIndex;
                    
                    const card = document.createElement('div');
                    card.className = 'tz-card';
                    card.id = `row-${currentIndex}`;
                    
                    const dstWarningHtml = zone.nextTransitionText ? `<div class="tz-dst-upcoming">${zone.nextTransitionText}</div>` : '';

                    card.innerHTML = `
                        <div class="tz-top-section">
                            <div class="tz-info">
                                <div class="tz-name"><span id="status-icon-${currentIndex}" style="display:flex; align-items:center;"></span> ${zone.name}</div>
                                <div class="tz-meta">
                                    <span class="badge" id="offset-${currentIndex}">--</span>
                                    <span class="badge" id="dst-${currentIndex}">--</span>
                                </div>
                                ${dstWarningHtml}
                                <div class="tz-holiday" id="holiday-${currentIndex}"></div>
                            </div>
                            <div class="tz-time-block">
                                <div class="tz-time" id="time-${currentIndex}">--:--</div>
                                <div class="tz-date" id="date-${currentIndex}">--</div>
                            </div>
                        </div>
                        <div class="slider-container">
                            <input type="range" id="slider-${currentIndex}" min="0" max="1439" step="15" 
                                   oninput="handleSliderChange(${currentIndex}, this.value)">
                        </div>
                    `;
                    groupDiv.appendChild(card);
                    globalIndex++;
                });
                container.appendChild(groupDiv);
            });
            updateAllViews();
            fetchAndDisplayHolidays();
        }

        async function fetchAndDisplayHolidays() {
            const currentYear = new Date().getFullYear();
            const todayDt = DateTime.now();
            const todayIso = todayDt.toISODate(); 
            const thirtyDaysLaterIso = todayDt.plus({ days: 30 }).toISODate();
            const t = i18n[currentLang];

            for (let i = 0; i < allZones.length; i++) {
                const zone = allZones[i];
                if (!zone.countries) continue;

                let closestHoliday = null;

                for (let countryCode of zone.countries) {
                    let holidays = [];
                    
                    try {
                        const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${currentYear}/${countryCode}`);
                        if (response.ok) {
                            holidays = await response.json();
                        }
                    } catch (error) { console.warn(`API fetch failed for ${countryCode}`); }

                    if (customHolidays[countryCode]) {
                        customHolidays[countryCode].forEach(ch => {
                            holidays.push({ date: ch.date, name: ch.name[currentLang], localName: ch.name[currentLang] });
                        });
                    }

                    const upcoming = holidays.filter(h => h.date >= todayIso && h.date <= thirtyDaysLaterIso).find(h => {
                        const weekday = DateTime.fromISO(h.date).weekday;
                        return weekday >= 1 && weekday <= 5; 
                    });

                    if (upcoming) {
                        if (!closestHoliday || upcoming.date < closestHoliday.date) {
                            closestHoliday = {
                                date: upcoming.date,
                                name: upcoming.localName || upcoming.name,
                                countryName: t.countries[countryCode]
                            };
                        }
                    }
                }

                if (closestHoliday) {
                    const dt = DateTime.fromISO(closestHoliday.date);
                    zone.fetchedHolidayText = `📅 ${dt.toFormat('MM/dd (ccc)')}: [${closestHoliday.countryName}] ${closestHoliday.name}`;
                }
            }
            updateAllViews(); 
        }

        window.handleSliderChange = function(changedIndex, newMinutes) {
            const zone = allZones[changedIndex];
            const baseDt = DateTime.fromMillis(globalUnixTime).setZone(zone.tz);
            const newDt = baseDt.set({ hour: Math.floor(newMinutes / 60), minute: newMinutes % 60 });
            globalUnixTime = newDt.toMillis();
            updateAllViews();
        };

        window.resetToNow = function() {
            globalUnixTime = DateTime.now().toMillis();
            updateAllViews();
        };

        function updateAllViews() {
            const t = i18n[currentLang];
            allZones.forEach((zone, index) => {
                const dt = DateTime.fromMillis(globalUnixTime).setZone(zone.tz);
                
                document.getElementById(`time-${index}`).innerText = dt.toFormat('HH:mm');
                document.getElementById(`date-${index}`).innerText = dt.toFormat('MM/dd (ccc)');
                
                const offsetHours = dt.offset / 60;
                document.getElementById(`offset-${index}`).innerText = `${dt.toFormat('z')} (UTC${offsetHours >= 0 ? '+' : ''}${offsetHours})`;
                
                const dstBadge = document.getElementById(`dst-${index}`);
                if (dt.isInDST) {
                    dstBadge.innerText = t.dst;
                    dstBadge.classList.add('dst-active');
                } else {
                    dstBadge.innerText = t.std;
                    dstBadge.classList.remove('dst-active');
                }

                document.getElementById(`slider-${index}`).value = dt.hour * 60 + dt.minute;

                const cardElement = document.getElementById(`row-${index}`);
                const iconElement = document.getElementById(`status-icon-${index}`);
                
                cardElement.classList.remove('is-morning', 'is-work', 'is-rest');
                
                if (dt.hour >= 7 && dt.hour < 9) {
                    cardElement.classList.add('is-morning');
                    if (iconElement) iconElement.innerHTML = '<span style="font-size: 1.1em;">🌅</span>';
                } else if (dt.hour >= 9 && dt.hour < 18) {
                    cardElement.classList.add('is-work');
                    if (iconElement) iconElement.innerHTML = '<span style="font-size: 1.2em;">👷</span>';
                } else {
                    cardElement.classList.add('is-rest');
                    if (iconElement) iconElement.innerHTML = '<span style="font-size: 1.8em; margin-bottom: 2px;">💤</span>';
                }

                let holidayTextToShow = zone.fetchedHolidayText || '';
                let shouldShowHoliday = !!holidayTextToShow;

                if (zone.id === 'jo-sa-tr' && dt.weekday === 5) {
                    holidayTextToShow = `📅 ${dt.toFormat('MM/dd (ccc)')}: [${t.zones[6].split(' / ')[0]}] ${t.weekendOff}`;
                    shouldShowHoliday = true;
                }

                const holidayEl = document.getElementById(`holiday-${index}`);
                if (holidayEl) {
                    if (shouldShowHoliday) {
                        holidayEl.innerHTML = holidayTextToShow;
                        holidayEl.style.display = 'inline-block';
                    } else {
                        holidayEl.style.display = 'none';
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof luxon === 'undefined') return;
            initTimeSync();
            
            setInterval(() => {
                updateAllViews();
            }, 60000);
            
            if (typeof L !== 'undefined') {
                const map = L.map('map').setView([20, 10], 2);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CARTO', subdomains: 'abcd', maxZoom: 10, minZoom: 1
                }).addTo(map);

                const glowIcon = L.divIcon({ className: 'custom-glow-icon', html: '<div class="glowing-dot"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
                
                // 加入時區資料 (tz) 用於計算偏移量與顯示名稱
                const locations = [
                    { name: "Taipei (Taiwan)", lat: 25.0330, lng: 121.5654, tz: "Asia/Taipei" }, 
                    { name: "Beijing (China)", lat: 39.9042, lng: 116.4074, tz: "Asia/Shanghai" },
                    { name: "Singapore", lat: 1.3521, lng: 103.8198, tz: "Asia/Singapore" }, 
                    { name: "Kuala Lumpur (Malaysia)", lat: 3.1390, lng: 101.6869, tz: "Asia/Kuala_Lumpur" },
                    { name: "New Delhi (India)", lat: 28.6139, lng: 77.2090, tz: "Asia/Kolkata" }, 
                    { name: "Bengaluru (India)", lat: 12.9716, lng: 77.5946, tz: "Asia/Kolkata" },
                    { name: "Hyderabad (India)", lat: 17.3850, lng: 78.4867, tz: "Asia/Kolkata" }, 
                    { name: "Tokyo (Japan)", lat: 35.6762, lng: 139.6503, tz: "Asia/Tokyo" },
                    { name: "Seoul (Korea)", lat: 37.5665, lng: 126.9780, tz: "Asia/Seoul" }, 
                    { name: "Sydney (Australia)", lat: -33.8688, lng: 151.2093, tz: "Australia/Sydney" },
                    { name: "Melbourne (Australia)", lat: -37.8136, lng: 144.9631, tz: "Australia/Melbourne" }, 
                    { name: "Wellington (New Zealand)", lat: -41.2865, lng: 174.7762, tz: "Pacific/Auckland" },
                    { name: "Bangkok (Thailand)", lat: 13.7563, lng: 100.5018, tz: "Asia/Bangkok" }, 
                    { name: "Hanoi (Vietnam)", lat: 21.0285, lng: 105.8542, tz: "Asia/Ho_Chi_Minh" },
                    { name: "Amman (Jordan)", lat: 31.9454, lng: 35.9284, tz: "Asia/Amman" }, 
                    { name: "Riyadh (Saudi Arabia)", lat: 24.7136, lng: 46.6753, tz: "Asia/Riyadh" },
                    { name: "Ankara (Turkey)", lat: 39.9334, lng: 32.8597, tz: "Europe/Istanbul" }, 
                    { name: "Bucharest (Romania)", lat: 44.4268, lng: 26.1025, tz: "Europe/Bucharest" },
                    { name: "Berlin (Germany)", lat: 52.5200, lng: 13.4050, tz: "Europe/Berlin" }, 
                    { name: "Madrid (Spain)", lat: 40.4168, lng: -3.7038, tz: "Europe/Madrid" },
                    { name: "London (UK)", lat: 51.5074, lng: -0.1278, tz: "Europe/London" }, 
                    { name: "Lisbon (Portugal)", lat: 38.7223, lng: -9.1393, tz: "Europe/Lisbon" },
                    { name: "New York (EST)", lat: 40.7128, lng: -74.0060, tz: "America/New_York" }, 
                    { name: "Charlotte (EST)", lat: 35.2271, lng: -80.8431, tz: "America/New_York" },
                    { name: "Chicago (CST)", lat: 41.8781, lng: -87.6298, tz: "America/Chicago" }, 
                    { name: "Las Colinas (CST)", lat: 32.8687, lng: -96.9405, tz: "America/Chicago" },
                    { name: "Los Angeles (PST)", lat: 34.0522, lng: -118.2437, tz: "America/Los_Angeles" }, 
                    { name: "Seattle (PST)", lat: 47.6062, lng: -122.3321, tz: "America/Los_Angeles" },
                    { name: "San Jose (Costa Rica)", lat: 9.9281, lng: -84.0907, tz: "America/Costa_Rica" },
                    { name: "Phoenix (AZ)", lat: 33.4484, lng: -112.0740, tz: "America/Phoenix" }
                ];

                const bounds = [];
                const currentNow = DateTime.now();

                locations.forEach(loc => {
                    // 計算各時區目前的偏移量
                    const dt = currentNow.setZone(loc.tz);
                    const offsetHours = dt.offset / 60;
                    const offsetStr = `UTC${offsetHours >= 0 ? '+' : ''}${offsetHours}`;
                    
                    // 組裝 Tooltip 的 HTML 內容
                    const tooltipContent = `
                        <div class="map-tooltip-title">${loc.name}</div>
                        <div class="map-tooltip-tz">${loc.tz} (${offsetStr})</div>
                    `;

                    // 改用 bindTooltip，設定 hover 效果
                    L.marker([loc.lat, loc.lng], { icon: glowIcon })
                        .addTo(map)
                        .bindTooltip(tooltipContent, {
                            direction: 'top',
                            offset: [0, -10],
                            className: 'map-tooltip',
                            opacity: 1
                        });
                        
                    bounds.push([loc.lat, loc.lng]);
                });
                
                map.fitBounds(bounds, { padding: [20, 20] });
            }
        });
    </script>
</body>
</html>
